name: Fetch BTC Price Daily

on:
  schedule:
    # 7:30 AM UTC
    - cron: '30 7 * * *'
    # 4:00 PM UTC (US Market Open)
    - cron: '0 16 * * *'
    # 9:00 PM UTC (US Market Close)
    - cron: '0 21 * * *'
  workflow_dispatch:

jobs:
  fetch-btc:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
      
      - name: Fetch BTC price from CoinGecko
        run: |
          curl -s "https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd&include_24hr_change=true" > btc-data.json
          cat btc-data.json
      
      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add btc-data.json
          git commit -m "Update BTC price - $(date -u +'%Y-%m-%d %H:%M:%S UTC')" || echo "No changes to commit"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}