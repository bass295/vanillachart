name: Fetch BTC Price Daily

on:
  schedule:
    # 7:30 AM UTC (3:30 AM EST)
    - cron: '30 7 * * *'
    # 4:00 PM UTC (12:00 PM EST / 9:00 AM PST) - US Market Open
    - cron: '0 16 * * *'
    # 9:00 PM UTC (4:00 PM EST / 1:00 PM PST) - US Market Close
    - cron: '0 21 * * *'
  # Also allow manual trigger
  workflow_dispatch:

jobs:
  fetch-btc:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
      
      - name: Fetch BTC daily candle from Kraken
        run: |
          # Fetch last 2 days of 1440min (daily) candles from Kraken
          curl -s "https://api.kraken.com/0/public/OHLC?pair=XBTUSDT&interval=1440" | jq '{
            bitcoin: {
              usd: .result.XXBTZUSD[-1][4] | tonumber,
              daily_change_percent: (((.result.XXBTZUSD[-1][4] - .result.XXBTZUSD[-1][1]) / .result.XXBTZUSD[-1][1]) * 100) | tonumber,
              open: .result.XXBTZUSD[-1][1] | tonumber,
              close: .result.XXBTZUSD[-1][4] | tonumber,
              high: .result.XXBTZUSD[-1][2] | tonumber,
              low: .result.XXBTZUSD[-1][3] | tonumber
            }
          }' > btc-data.json
          cat btc-data.json
      
      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add btc-data.json
          git commit -m "Update BTC price - $(date -u +'%Y-%m-%d %H:%M:%S UTC')" || echo "No changes to commit"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}